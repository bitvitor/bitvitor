<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BitVitor – Dinheiro P2P</title>
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="main-header">
    <nav class="container nav-content" role="navigation" aria-label="Principal">
      <a href="index.html" class="logo">BitVitor<span>.com</span></a>
      <div class="lang-nav" aria-label="Idiomas">
        <a href="index.html" class="lang-link">PT</a>
        <a href="de/index.html" class="lang-link">DE</a>
        <a href="en/index.html" class="lang-link">EN</a>
        <a href="es/index.html" class="lang-link">ES</a>
      </div>
    </nav>
  </header>

  <main class="container" id="content">
    <!-- HERO -->
    <section class="hero"></section>

    <!-- CARDS -->
    <section class="comparison-grid" id="cards"></section>

    <!-- WALLET GRID -->
    <section id="carteiras">
      <h2 class="section-title">Instale sua Carteira em 5 Minutos</h2>
      <div class="wallet-grid" id="wallets"></div>
      <div class="instr-box" id="install-instructions"></div>
    </section>

    <!-- SECURITY SECTION -->
    <section class="security-section" id="security"></section>

    <!-- MERCHANTS -->
    <section id="comerciantes" class="merchant-grid">
      <div id="merchant-benefits"></div>
      <div class="card" id="merchant-tools"></div>
    </section>
  </main>

  <footer>
    <div class="container footer-grid" id="footer"></div>
    <div class="container" id="footer-bottom"></div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
